name: Latest writeups

# Pull the newest posts from the site's Atom feed into the profile README,
# between the BLOG-POST-LIST markers. Runs daily and on demand.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync latest writeups from feed
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://mariustudor07.github.io/feed.xml"
          max_post_count: 5
          template: "- [$title]($url)$newline"
          commit_message: "chore: refresh latest writeups from site feed"
